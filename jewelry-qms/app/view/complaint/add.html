<div class="card">
    <div class="card-header"><h5 class="mb-0">登记客户投诉</h5></div>
    <div class="card-body">
        <form method="post" action="/complaint/add">
            <div class="row">
                <div class="col-md-6 mb-3"><label class="required">投诉编号</label><input name="complaint_number" class="form-control" placeholder="自动生成"></div>
                <div class="col-md-6 mb-3"><label class="required">受理日期</label><input type="date" name="received_date" class="form-control" value="{:date('Y-m-d')}" required></div>
                <div class="col-md-6 mb-3"><label class="required">客户名称</label><input name="customer_name" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label>联系方式</label><input name="contact" class="form-control"></div>
                <div class="col-md-6 mb-3"><label>关联报告编号</label><input name="report_number" class="form-control"></div>
                <div class="col-md-6 mb-3"><label>责任人</label><select name="assigned_to" class="form-select"><option value="">请选择</option>{volist name="users" id="u"}<option value="{$u.id}">{$u.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label>处理期限</label><input type="date" name="due_date" class="form-control"></div>
                <div class="col-12 mb-3"><label class="required">投诉内容</label><textarea name="description" class="form-control" rows="4" required></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/complaint/index" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div>
