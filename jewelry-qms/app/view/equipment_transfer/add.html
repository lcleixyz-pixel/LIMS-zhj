<div class="card">
    <div class="card-header"><h5 class="mb-0">新增设备调拨</h5></div>
    <div class="card-body">
        <form method="post" action="/equipment_transfer/add">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label required">设备</label>
                    <select name="equipment_id" class="form-select" required>
                        <option value="">请选择</option>
                        {volist name="equipments" id="eq"}<option value="{$eq.id}">{$eq.equipment_number} - {$eq.name}</option>{/volist}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label required">调入场所</label>
                    <select name="to_site_id" class="form-select" required>
                        <option value="">请选择</option>
                        {volist name="sites" id="site"}<option value="{$site.id}">{$site.name}</option>{/volist}
                    </select>
                </div>
                <div class="col-md-6 mb-3"><label class="form-label required">调拨日期</label><input type="date" name="transfer_date" value="{:date('Y-m-d')}" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label class="form-label">经办人</label><input name="transferred_by" class="form-control"></div>
                <div class="col-12 mb-3"><label class="form-label">调拨原因</label><textarea name="reason" rows="3" class="form-control"></textarea></div>
                <div class="col-12 mb-3"><label class="form-label">备注</label><textarea name="remarks" rows="3" class="form-control"></textarea></div>
            </div>
            <div class="text-end">
                <a href="/equipment_transfer/index" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
