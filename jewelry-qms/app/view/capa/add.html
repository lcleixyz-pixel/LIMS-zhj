<div class="card">
    <div class="card-header"><h5 class="mb-0">新建CAPA</h5></div>
    <div class="card-body">
        <form method="post" action="/capa/add">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">CAPA编号</label>
                    <input type="text" name="capa_number" class="form-control" placeholder="留空自动生成">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label required">来源类型</label>
                    <select name="source_type" class="form-select" required>
                        {foreach $sourceTypes as $key=>$label}
                        <option value="{$key}">{$label}</option>
                        {/foreach}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">来源记录ID</label>
                    <input type="text" name="source_record_id" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">责任人</label>
                    <select name="assigned_to" class="form-select">
                        <option value="">请选择</option>
                        {volist name="users" id="u"}<option value="{$u.id}">{$u.name}</option>{/volist}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">计划完成日期</label>
                    <input type="date" name="due_date" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">状态</label>
                    <select name="status" class="form-select">
                        {foreach $statusLabels as $key=>$label}<option value="{$key}">{$label}</option>{/foreach}
                    </select>
                </div>
                <div class="col-12 mb-3">
                    <label class="form-label required">问题描述</label>
                    <textarea name="description" class="form-control" rows="4" required></textarea>
                </div>
            </div>
            <div class="text-end">
                <a href="/capa/index" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
