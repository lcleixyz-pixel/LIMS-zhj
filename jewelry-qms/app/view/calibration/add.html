<div class="card">
    <div class="card-header"><h5 class="mb-0">新增校准记录</h5></div>
    <div class="card-body">
        <form method="post" action="/calibration/add">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label required">设备</label>
                    <select name="equipment_id" class="form-select" required>
                        <option value="">请选择</option>
                        {volist name="equipments" id="eq"}<option value="{$eq.id}" {if $currentEquipmentId == $eq.id}selected{/if}>{$eq.equipment_number} {$eq.name}</option>{/volist}
                    </select>
                </div>
                <div class="col-md-6 mb-3"><label class="form-label required">校准日期</label><input type="date" name="calibration_date" class="form-control" value="{$today}" required></div>
                <div class="col-md-6 mb-3"><label class="form-label">下次到期</label><input type="date" name="next_due_date" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label">校准机构</label><input name="calibration_org" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label">证书编号</label><input name="certificate_number" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label">结果</label><select name="result" class="form-select">{volist name="resultOptions" id="option"}<option value="{$option.value}">{$option.label}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label">测量不确定度</label><input name="uncertainty" class="form-control"></div>
                <div class="col-12 mb-3"><label class="form-label">备注</label><textarea name="remarks" class="form-control" rows="3"></textarea></div>
            </div>
            <a href="/calibration/index" class="btn btn-secondary">取消</a>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
</div>
