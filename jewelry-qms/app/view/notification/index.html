<div class="card">
    <div class="card-header d-flex justify-content-between">
        <h5 class="mb-0">通知中心</h5>
        <a href="/notification/markAllRead" class="btn btn-sm btn-outline-secondary">全部标为已读</a>
    </div>
    <div class="card-body">
        <table class="table table-striped table-sm">
            <thead><tr><th>标题</th><th>内容</th><th>类型</th><th>时间</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>
                {volist name="items" id="item"}
                <tr class="{if $item.status==0}table-warning{/if}">
                    <td>{$item.title}</td>
                    <td>{$item.message|mb_substr=0,40,'utf-8'}</td>
                    <td>{$item.type}</td>
                    <td>{$item.created}</td>
                    <td>{if $item.status==0}<span class="badge bg-danger">未读</span>{else}<span class="badge bg-secondary">已读</span>{/if}</td>
                    <td><a href="/notification/read?id={$item.id}" class="btn btn-sm btn-outline-primary">查看</a></td>
                </tr>
                {/volist}
                {empty name="items"}<tr><td colspan="6" class="text-center text-muted">暂无通知</td></tr>{/empty}
            </tbody>
        </table>
        <nav><ul class="pagination pagination-sm justify-content-center">{$pages|raw}</ul></nav>
    </div>
</div>
