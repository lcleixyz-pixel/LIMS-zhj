<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">审核日程</h5>
        <a href="/audit_schedule/add" class="btn btn-primary btn-sm">新增</a>
    </div>
    <div class="card-body">
        <table class="table table-striped table-hover table-sm">
            <thead><tr><th>审核日期</th><th>部门</th><th>条款</th><th>场所</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>
                {volist name="items" id="item"}
                <tr>
                    <td>{$item.audit_date}</td>
                    <td>{$item.department_id|default='-'}</td>
                    <td>{$item.clause|default='-'}</td>
                    <td>{$item.site_id|default='未指定'}</td>
                    <td>{:qms_status_label('audit_schedule', $item.status)}</td>
                    <td>
                        <a href="/audit_schedule/view?id={$item.id}" class="btn btn-sm btn-outline-info">查看</a>
                        <a href="/audit_schedule/edit?id={$item.id}" class="btn btn-sm btn-outline-primary">编辑</a>
                    </td>
                </tr>
                {/volist}
                {empty name="items"}<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>{/empty}
            </tbody>
        </table>
        <nav><ul class="pagination pagination-sm justify-content-center">{$pages|raw}</ul></nav>
    </div>
</div>
