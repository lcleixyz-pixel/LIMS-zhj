<div class="card">
    <div class="card-header"><h5 class="mb-0">编辑审核日程</h5></div>
    <div class="card-body">
        <form method="post" action="/audit_schedule/edit">
            <input type="hidden" name="id" value="{$record.id}">
            <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label required">审核计划</label><select name="audit_plan_id" class="form-select" required><option value="">请选择</option>{volist name="auditPlans" id="plan"}<option value="{$plan.id}" {if $record.audit_plan_id == $plan.id}selected{/if}>{$plan.title}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label required">审核日期</label><input type="date" name="audit_date" value="{$record.audit_date}" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label class="form-label">覆盖场所</label><select name="site_id" class="form-select"><option value="">未指定</option>{volist name="sites" id="site"}<option value="{$site.id}" {if $record.site_id == $site.id}selected{/if}>{$site.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label">受审核部门</label><select name="department_id" class="form-select"><option value="">请选择</option>{volist name="departments" id="dept"}<option value="{$dept.id}" {if $record.department_id == $dept.id}selected{/if}>{$dept.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label">审核条款</label><input name="clause" value="{$record.clause|default=''}" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label">审核员</label><select name="auditor_id" class="form-select"><option value="">请选择</option>{volist name="users" id="u"}<option value="{$u.id}" {if $record.auditor_id == $u.id}selected{/if}>{$u.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label">受审核人</label><select name="auditee_id" class="form-select"><option value="">请选择</option>{volist name="users" id="u"}<option value="{$u.id}" {if $record.auditee_id == $u.id}selected{/if}>{$u.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label">状态</label><select name="status" class="form-select">{foreach $statusLabels as $key=>$label}<option value="{$key}" {if $record.status == $key}selected{/if}>{$label}</option>{/foreach}</select></div>
            </div>
            <div class="text-end">
                <a href="/audit_schedule/index" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">更新</button>
            </div>
        </form>
    </div>
</div>
