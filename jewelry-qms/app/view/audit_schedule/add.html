<div class="card">
    <div class="card-header"><h5 class="mb-0">新增审核日程</h5></div>
    <div class="card-body">
        <form method="post" action="/audit_schedule/add">
            <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label required">审核计划</label><select name="audit_plan_id" class="form-select" required><option value="">请选择</option>{volist name="auditPlans" id="plan"}<option value="{$plan.id}">{$plan.title}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label required">审核日期</label><input type="date" name="audit_date" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label class="form-label">覆盖场所</label><select name="site_id" class="form-select"><option value="">未指定</option>{volist name="sites" id="site"}<option value="{$site.id}">{$site.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label">受审核部门</label><select name="department_id" class="form-select"><option value="">请选择</option>{volist name="departments" id="dept"}<option value="{$dept.id}">{$dept.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label">审核条款</label><input name="clause" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label">审核员</label><select name="auditor_id" class="form-select"><option value="">请选择</option>{volist name="users" id="u"}<option value="{$u.id}">{$u.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label">受审核人</label><select name="auditee_id" class="form-select"><option value="">请选择</option>{volist name="users" id="u"}<option value="{$u.id}">{$u.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label">状态</label><select name="status" class="form-select">{foreach $statusLabels as $key=>$label}<option value="{$key}">{$label}</option>{/foreach}</select></div>
            </div>
            <div class="text-end">
                <a href="/audit_schedule/index" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
