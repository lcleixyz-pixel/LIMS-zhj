<div class="card">
    <div class="card-header">
        <h5 class="mb-0">责任分配表</h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-sm table-striped align-middle">
                <thead><tr><th>条款</th><th>岗位</th><th>责任类型</th><th>原符号</th><th>状态</th></tr></thead>
                <tbody>
                    {volist name="items" id="item"}
                    <tr>
                        <td>{$item.clause_number}</td>
                        <td>{$item.position_name}</td>
                        <td>{$item.responsibility_type}</td>
                        <td>{$item.raw_symbol|default='-'}</td>
                        <td><span class="badge bg-secondary">{$item.review_status}</span></td>
                    </tr>
                    {/volist}
                    {empty name="items"}
                    <tr><td colspan="5" class="text-center text-muted">暂无责任分配数据</td></tr>
                    {/empty}
                </tbody>
            </table>
        </div>
        <nav><ul class="pagination pagination-sm justify-content-center">{$pages|raw}</ul></nav>
    </div>
</div>
