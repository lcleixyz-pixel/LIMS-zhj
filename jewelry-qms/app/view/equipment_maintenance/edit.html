<div class="card">
    <div class="card-header"><h5 class="mb-0">编辑 {$pageTitle|default='设备维护保养'}</h5></div>
    <div class="card-body">
        <form method="post" action="/equipment_maintenance/edit">
            <input type="hidden" name="id" value="{$record.id}">
            <div class="mb-3">
                <label class="form-label">设备</label>
                <select name="equipment_id" class="form-select" required>
                    {volist name="equipments" id="eq"}
                    <option value="{$eq.id}" {if $record.equipment_id == $eq.id}selected{/if}>{$eq.equipment_number} {$eq.name}</option>
                    {/volist}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label required">维护日期</label>
                <input type="date" name="maintenance_date" class="form-control" required value="{$record.maintenance_date|default=''}">
            </div>
            <div class="mb-3">
                <label class="form-label">类型</label>
                <select name="maintenance_type" class="form-select">
                    <option value="routine" {if $record.maintenance_type == 'routine'}selected{/if}>routine</option>
                    <option value="repair" {if $record.maintenance_type == 'repair'}selected{/if}>repair</option>
                    <option value="verification" {if $record.maintenance_type == 'verification'}selected{/if}>verification</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">说明</label>
                <textarea name="description" class="form-control" rows="3">{$record.description|default=''}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">执行人</label>
                <input type="text" name="performed_by" class="form-control" value="{$record.performed_by|default=''}">
            </div>
            <div class="mb-3">
                <label class="form-label">下次到期</label>
                <input type="date" name="next_due_date" class="form-control" value="{$record.next_due_date|default=''}">
            </div>
            <a href="/equipment_maintenance/index" class="btn btn-secondary">取消</a>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
</div>
