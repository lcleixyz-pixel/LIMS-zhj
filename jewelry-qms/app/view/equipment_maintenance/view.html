<div class="card">
    <div class="card-header d-flex justify-content-between">
        <h5 class="mb-0">{$pageTitle|default='详情'}</h5>
        <div>
            <a href="/equipment_maintenance/edit?id={$record.id}" class="btn btn-sm btn-outline-primary">编辑</a>
            <a href="/equipment_maintenance/index" class="btn btn-sm btn-outline-secondary">返回</a>
        </div>
    </div>
    <div class="card-body">
        <table class="table table-bordered">
            <tr><th width="160">设备</th><td>{$record.equipment_id|default=''}</td></tr>
            <tr><th>维护日期</th><td>{$record.maintenance_date|default=''}</td></tr>
            <tr><th>类型</th><td>{$record.maintenance_type|default=''}</td></tr>
            <tr><th>说明</th><td>{$record.description|default='-'}</td></tr>
            <tr><th>执行人</th><td>{$record.performed_by|default='-'}</td></tr>
            <tr><th>下次到期</th><td>{$record.next_due_date|default='-'}</td></tr>
        </table>
    </div>
</div>
