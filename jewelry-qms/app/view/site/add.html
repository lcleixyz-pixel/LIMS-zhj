<div class="card">
    <div class="card-header"><h5 class="mb-0">新增场所</h5></div>
    <div class="card-body">
        <form method="post" action="/site/add">
            <div class="row">
                <div class="col-md-4 mb-3"><label class="form-label required">场所代码</label><input name="code" class="form-control" required></div>
                <div class="col-md-8 mb-3"><label class="form-label required">场所名称</label><input name="name" class="form-control" required></div>
                <div class="col-md-4 mb-3"><label class="form-label">类型</label><select name="site_type" class="form-select">{foreach $siteTypes as $key=>$label}<option value="{$key}">{$label}</option>{/foreach}</select></div>
                <div class="col-md-4 mb-3"><label class="form-label">状态</label><select name="status" class="form-select">{foreach $siteStatuses as $key=>$label}<option value="{$key}">{$label}</option>{/foreach}</select></div>
                <div class="col-md-4 mb-3"><label class="form-label">排序</label><input type="number" name="sort_order" value="0" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label">联系人</label><input name="contact_person" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label">电话</label><input name="phone" class="form-control"></div>
                <div class="col-12 mb-3"><label class="form-label">地址</label><textarea name="address" rows="3" class="form-control"></textarea></div>
            </div>
            <div class="text-end">
                <a href="/site/index" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
