<div class="card">
    <div class="card-header"><h5 class="mb-0">新增 {$pageTitle|default='评审决议'}</h5></div>
    <div class="card-body">
        <form method="post" action="/review_action/add">
            <div class="mb-3">
                <label class="form-label">关联管理评审</label>
                <select name="management_review_id" class="form-select" required>
                    <option value="">请选择</option>
                    {volist name="reviews" id="r"}
                    <option value="{$r.id}">{$r.review_date} - {$r.title}</option>
                    {/volist}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">决议/措施内容</label>
                <textarea name="action_item" class="form-control" rows="4" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">责任人（员工 ID）</label>
                <select name="responsible_id" class="form-select">
                    <option value="">请选择</option>
                    {volist name="employees" id="e"}
                    <option value="{$e.id}">{$e.name} ({$e.employee_number})</option>
                    {/volist}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">截止日期</label>
                <input type="date" name="due_date" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">状态</label>
                <select name="status" class="form-select">
                    <option value="open">open</option>
                    <option value="in_progress">in_progress</option>
                    <option value="completed">completed</option>
                    <option value="overdue">overdue</option>
                </select>
            </div>
            <a href="/review_action/index" class="btn btn-secondary">取消</a>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
</div>
