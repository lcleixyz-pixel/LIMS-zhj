<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">部门管理</h5>
        <a href="/department/add" class="btn btn-primary btn-sm">新增部门</a>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover table-sm align-middle">
                <thead>
                    <tr>
                        <th>编号</th>
                        <th>名称</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th class="text-end">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {volist name="items" id="item"}
                    <tr>
                        <td>{$item.code|default='-'}</td>
                        <td>{$item.name}</td>
                        <td>
                            {if $item.publish == 1}
                            <span class="badge bg-success">启用</span>
                            {else}
                            <span class="badge bg-secondary">停用</span>
                            {/if}
                        </td>
                        <td>{$item.created|default='-'}</td>
                        <td class="text-end">
                            <a href="/department/view?id={$item.id}" class="btn btn-sm btn-outline-info">查看</a>
                            <a href="/department/edit?id={$item.id}" class="btn btn-sm btn-outline-primary">编辑</a>
                            <a href="/department/delete?id={$item.id}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确认删除？')">删除</a>
                        </td>
                    </tr>
                    {/volist}
                    {empty name="items"}
                    <tr><td colspan="5" class="text-center text-muted py-4">暂无部门</td></tr>
                    {/empty}
                </tbody>
            </table>
        </div>
        <nav>
            <ul class="pagination pagination-sm justify-content-center">
                {$pages|raw}
            </ul>
        </nav>
    </div>
</div>
