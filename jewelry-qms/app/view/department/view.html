<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">部门详情</h5>
        <div>
            <a href="/department/edit?id={$record.id}" class="btn btn-sm btn-outline-primary">编辑</a>
            <a href="/department/index" class="btn btn-sm btn-outline-secondary">返回列表</a>
        </div>
    </div>
    <div class="card-body">
        <table class="table table-bordered align-middle">
            <tr><th width="150">部门名称</th><td>{$record.name}</td></tr>
            <tr><th>部门编号</th><td>{$record.code|default='-'}</td></tr>
            <tr>
                <th>状态</th>
                <td>
                    {if $record.publish == 1}
                    <span class="badge bg-success">启用</span>
                    {else}
                    <span class="badge bg-secondary">停用</span>
                    {/if}
                </td>
            </tr>
            <tr><th>创建时间</th><td>{$record.created|default='-'}</td></tr>
            <tr><th>更新时间</th><td>{$record.modified|default='-'}</td></tr>
        </table>
    </div>
</div>
