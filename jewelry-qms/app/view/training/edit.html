<div class="card">
    <div class="card-header"><h5 class="mb-0">编辑培训活动</h5></div>
    <div class="card-body">
        <form method="post" action="/training/edit?id={$record.id}">
            <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label">所属培训计划</label><select name="training_plan_id" class="form-select"><option value="">不关联计划</option>{volist name="trainingPlans" id="plan"}<option value="{$plan.id}" {if $record.training_plan_id == $plan.id}selected{/if}>{$plan.plan_year} {$plan.title}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label required">培训主题</label><input name="title" class="form-control" value="{$record.title}" required></div>
                <div class="col-md-4 mb-3"><label class="form-label">培训类型</label><select name="training_type" class="form-select">{volist name="typeOptions" id="option"}<option value="{$option.value}" {if $record.training_type == $option.value}selected{/if}>{$option.label}</option>{/volist}</select></div>
                <div class="col-md-4 mb-3"><label class="form-label">培训日期</label><input type="date" name="training_date" class="form-control" value="{$record.training_date|default=''}"></div>
                <div class="col-md-4 mb-3"><label class="form-label">学时</label><input type="number" step="0.5" name="duration_hours" class="form-control" value="{$record.duration_hours|default=''}"></div>
                <div class="col-md-6 mb-3"><label class="form-label">讲师/培训机构</label><input name="trainer" class="form-control" value="{$record.trainer|default=''}"></div>
                <div class="col-md-6 mb-3"><label class="form-label">部门</label><select name="department_id" class="form-select"><option value="">请选择</option>{volist name="departments" id="dept"}<option value="{$dept.id}" {if $record.department_id == $dept.id}selected{/if}>{$dept.name}</option>{/volist}</select></div>
                <div class="col-md-4 mb-3"><label class="form-label">状态</label><select name="status" class="form-select">{volist name="statusOptions" id="option"}<option value="{$option.value}" {if $record.status == $option.value}selected{/if}>{$option.label}</option>{/volist}</select></div>
                <div class="col-12 mb-3"><label class="form-label">培训内容</label><textarea name="content" class="form-control" rows="4">{$record.content|default=''}</textarea></div>
            </div>
            <a href="/training/view?id={$record.id}" class="btn btn-secondary">取消</a>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
</div>
