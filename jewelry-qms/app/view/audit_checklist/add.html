<div class="card">
    <div class="card-header"><h5 class="mb-0">新增检查项</h5></div>
    <div class="card-body">
        <form method="post" action="/audit_checklist/add">
            <div class="mb-3"><label class="required">审核日程</label>
                <select name="audit_schedule_id" class="form-select" required>
                    {volist name="auditSchedules" id="s"}<option value="{$s.id}" {if $defaultScheduleId==$s.id}selected{/if}>{$s.audit_date}</option>{/volist}
                </select>
            </div>
            <div class="mb-3"><label>条款</label><input name="clause" class="form-control"></div>
            <div class="mb-3"><label class="required">检查项</label><textarea name="check_item" class="form-control" rows="3" required></textarea></div>
            <div class="mb-3"><label>结果</label><select name="result" class="form-select"><option value="">待检查</option>{volist name="resultOptions" id="l" key="k"}<option value="{$k}">{$l}</option>{/volist}</select></div>
            <div class="mb-3"><label>证据</label><textarea name="evidence" class="form-control" rows="2"></textarea></div>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
</div>
