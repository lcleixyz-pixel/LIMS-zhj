<div class="card">
    <div class="card-header"><h5 class="mb-0">新建人员资质证书</h5></div>
    <div class="card-body">
        <form method="post" action="/employee_certificate/add">
            <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label required">人员</label><select name="employee_id" class="form-select" required><option value="">请选择</option>{volist name="employees" id="employee"}<option value="{$employee.id}" {if $currentEmployeeId == $employee.id}selected{/if}>{$employee.employee_number} {$employee.name}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label class="form-label required">证书类型</label><input name="certificate_type" class="form-control" required></div>
                <div class="col-md-6 mb-3"><label class="form-label">证书编号</label><input name="certificate_number" class="form-control"></div>
                <div class="col-md-6 mb-3"><label class="form-label">发证机构</label><input name="issuing_authority" class="form-control"></div>
                <div class="col-md-4 mb-3"><label class="form-label">发证日期</label><input type="date" name="issue_date" class="form-control" value="{$today}"></div>
                <div class="col-md-4 mb-3"><label class="form-label">有效期至</label><input type="date" name="valid_until" class="form-control"></div>
                <div class="col-md-4 mb-3"><label class="form-label">复审日期</label><input type="date" name="review_date" class="form-control"></div>
                <div class="col-md-4 mb-3"><label class="form-label">状态</label><select name="status" class="form-select">{volist name="statusOptions" id="option"}<option value="{$option.value}">{$option.label}</option>{/volist}</select></div>
                <div class="col-12 mb-3"><label class="form-label">备注</label><textarea name="remarks" class="form-control" rows="3"></textarea></div>
            </div>
            <a href="/employee_certificate/index" class="btn btn-secondary">取消</a>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
</div>
