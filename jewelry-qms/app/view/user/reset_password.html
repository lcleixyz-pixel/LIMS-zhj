<div class="card">
    <div class="card-header"><h5 class="mb-0">重置密码 - {$record.username|default=''}</h5></div>
    <div class="card-body">
        {if session('error')}
        <div class="alert alert-danger">{$Think.session.error}</div>
        {/if}
        <form method="post" action="/user/changePassword?id={$record.id}">
            <div class="mb-3">
                <label class="form-label required">新密码</label>
                <input type="password" name="password" class="form-control" required minlength="6" autocomplete="new-password">
            </div>
            <a href="/user/index" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn btn-primary">保存</button>
        </form>
    </div>
</div>
