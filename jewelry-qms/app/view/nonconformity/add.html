<div class="card">
    <div class="card-header"><h5 class="mb-0">登记不符合工作</h5></div>
    <div class="card-body">
        <form method="post" action="/nonconformity/add">
            <div class="row">
                <div class="col-md-6 mb-3"><label>编号</label><input name="nc_number" class="form-control" placeholder="自动生成"></div>
                <div class="col-md-6 mb-3"><label class="required">发现日期</label><input type="date" name="identified_date" class="form-control" value="{:date('Y-m-d')}" required></div>
                <div class="col-md-6 mb-3"><label>来源</label><select name="source" class="form-select">{volist name="sourceOptions" id="l" key="k"}<option value="{$k}">{$l}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label>严重程度</label><select name="severity" class="form-select">{volist name="severityOptions" id="l" key="k"}<option value="{$k}">{$l}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label>处置决定</label><select name="disposition" class="form-select"><option value="">待评估</option>{volist name="dispositionOptions" id="l" key="k"}<option value="{$k}">{$l}</option>{/volist}</select></div>
                <div class="col-md-6 mb-3"><label>报告编号</label><input name="report_number" class="form-control"></div>
                <div class="col-md-6 mb-3"><label>责任人</label><select name="assigned_to" class="form-select"><option value="">请选择</option>{volist name="users" id="u"}<option value="{$u.id}">{$u.name}</option>{/volist}</select></div>
                <div class="col-12 mb-3"><label class="required">不符合描述</label><textarea name="description" class="form-control" rows="4" required></textarea></div>
                <div class="col-12 mb-3"><label>影响评估</label><textarea name="impact_assessment" class="form-control" rows="2"></textarea></div>
                <div class="col-12 mb-3"><label>即时措施</label><textarea name="immediate_action" class="form-control" rows="2"></textarea></div>
                <div class="col-12 mb-3 form-check">
                    <input type="checkbox" name="trigger_capa" value="1" class="form-check-input" id="trigger_capa">
                    <label class="form-check-label" for="trigger_capa">严重/危急不符合自动触发CAPA</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/nonconformity/index" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div>
