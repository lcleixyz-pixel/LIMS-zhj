<div class="card">
    <div class="card-header">
        <h5 class="mb-0">编辑体系文件</h5>
    </div>
    <div class="card-body">
        <form method="post" action="/document/edit" enctype="multipart/form-data">
            <input type="hidden" name="id" value="{$record.id}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="level" class="form-label required">文件层级</label>
                        <select name="level" id="level" class="form-select" required>
                            <option value="">请选择</option>
                            <option value="1" {if $record.level == 1}selected{/if}>一级 - 质量手册</option>
                            <option value="2" {if $record.level == 2}selected{/if}>二级 - 程序文件</option>
                            <option value="3" {if $record.level == 3}selected{/if}>三级 - 作业指导书</option>
                            <option value="4" {if $record.level == 4}selected{/if}>四级 - 记录表单</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="doc_number" class="form-label required">文件编号</label>
                        <input type="text" class="form-control" id="doc_number" name="doc_number" required value="{$record.doc_number|default=''}">
                    </div>
                    <div class="mb-3">
                        <label for="title" class="form-label required">文件标题</label>
                        <input type="text" class="form-control" id="title" name="title" required value="{$record.title|default=''}">
                    </div>
                    <div class="mb-3">
                        <label for="category_id" class="form-label">文件分类</label>
                        <select name="category_id" id="category_id" class="form-select">
                            <option value="">请选择</option>
                            {volist name="categories" id="cat"}
                            <option value="{$cat.id}" {if $record.category_id == $cat.id}selected{/if}>{$cat.name}</option>
                            {/volist}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="department_id" class="form-label">所属部门</label>
                        <select name="department_id" id="department_id" class="form-select">
                            <option value="">请选择</option>
                            {volist name="departments" id="dept"}
                            <option value="{$dept.id}" {if $record.department_id == $dept.id}selected{/if}>{$dept.name}</option>
                            {/volist}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="template_id" class="form-label">文件模板</label>
                        <select name="template_id" id="template_id" class="form-select">
                            <option value="">无模板</option>
                            {volist name="templates" id="tpl"}
                            <option value="{$tpl.id}" {if $record.template_id == $tpl.id}selected{/if}>{$tpl.name}</option>
                            {/volist}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="version" class="form-label">版本号</label>
                        <input type="text" class="form-control" id="version" name="version" value="{$record.version|default='1.0'}">
                    </div>
                    <div class="mb-3">
                        <label for="effective_date" class="form-label">生效日期</label>
                        <input type="date" class="form-control" id="effective_date" name="effective_date" value="{$record.effective_date|default=''}">
                    </div>
                    <div class="mb-3" id="reviewer-group">
                        <label for="reviewed_by" class="form-label">审核人</label>
                        <select name="reviewed_by" id="reviewed_by" class="form-select">
                            <option value="">请选择</option>
                            {volist name="reviewers" id="rev"}
                            <option value="{$rev.id}" {if $record.reviewed_by == $rev.id}selected{/if}>{$rev.name}</option>
                            {/volist}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="approved_by" class="form-label">批准人</label>
                        <select name="approved_by" id="approved_by" class="form-select">
                            <option value="">请选择</option>
                            {volist name="approvers" id="appr"}
                            <option value="{$appr.id}" {if $record.approved_by == $appr.id}selected{/if}>{$appr.name}</option>
                            {/volist}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="file" class="form-label">替换附件</label>
                        <input type="file" class="form-control" id="file" name="file">
                        {if $record.file_path}
                        <small class="text-muted">当前附件: {$record.file_path}</small>
                        {/if}
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">文件说明</label>
                <textarea class="form-control" id="description" name="description" rows="3">{$record.description|default=''}</textarea>
            </div>
            <div class="text-end">
                <a href="/document/view?id={$record.id}" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">更新</button>
            </div>
        </form>
    </div>
</div>
<script>
$(function(){
    $('#level').on('change', function(){
        var val = parseInt($(this).val());
        if(val === 3 || val === 4){
            $('#reviewer-group').hide();
        } else {
            $('#reviewer-group').show();
        }
    }).trigger('change');
});
</script>
