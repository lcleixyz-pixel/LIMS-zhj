<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">文件定期评审 - {$doc.doc_number|default=''}</h5>
        <a href="/document/view?id={$doc.id}" class="btn btn-sm btn-outline-secondary">返回</a>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <div class="text-muted small">文件标题</div>
            <div>{$doc.title|default=''}</div>
        </div>
        <form method="post" action="/document/review?id={$doc.id}" class="row g-3">
            <div class="col-md-4">
                <label class="form-label required">评审结论</label>
                <select name="result" class="form-select" required>
                    <option value="continue">继续使用</option>
                    <option value="revise">需要修订</option>
                    <option value="obsolete">作废并回收</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">下次评审日期</label>
                <input type="date" name="next_review_date" class="form-control" value="{$doc.review_date|default=''}">
            </div>
            <div class="col-12">
                <label class="form-label required">评审说明</label>
                <textarea name="review_note" class="form-control" rows="4" required></textarea>
            </div>
            <div class="col-12 text-end">
                <button type="submit" class="btn btn-primary">保存评审记录</button>
            </div>
        </form>
    </div>
</div>
